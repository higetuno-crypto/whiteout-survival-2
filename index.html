<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雪原サバイバル2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#e4eaf4;touch-action:none;user-select:none;
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
canvas{display:block}
#hud{position:fixed;top:12px;right:12px;z-index:10;display:flex;flex-direction:column;gap:8px;
  align-items:flex-end;pointer-events:none}
.chip{background:rgba(80,80,80,.75);color:#fff;font-weight:700;font-size:16px;
  padding:8px 16px;border-radius:18px;letter-spacing:.5px}
.chip.punch{animation:chipPunch .28s ease-out}
@keyframes chipPunch{30%{transform:scale(1.22)}100%{transform:scale(1)}}
#title{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;z-index:10;pointer-events:none}
#title span{background:linear-gradient(135deg,#4a9ede,#2a6ebe);color:#fff;padding:6px 20px;
  border-radius:0 0 16px 16px;font-weight:900;font-size:14px;letter-spacing:2px}
#upgrades{position:fixed;bottom:16px;right:12px;z-index:10;display:flex;flex-direction:column;gap:6px}
.upg{padding:10px 14px;font-size:13px;border:none;border-radius:14px;color:#fff;font-weight:700;
  text-align:left;min-width:150px;cursor:pointer}
.upg:disabled{opacity:.45;filter:grayscale(.4)}
.upg.hidden{display:none}
#toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:20;color:#fff;font-weight:700;
  text-shadow:0 2px 4px rgba(0,0,0,.5);opacity:0;transition:opacity .4s;pointer-events:none}
#fatal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:100;
  background:#1a2a3a;color:#fff;text-align:center;padding:24px;font-size:16px;line-height:1.8}
#debug{position:fixed;left:10px;bottom:10px;z-index:30;display:none;flex-direction:column;gap:4px;
  background:rgba(0,0,0,.5);color:#0f0;font:12px monospace;padding:8px;border-radius:8px}
#debug button{font:12px monospace;pointer-events:auto}
</style>
<!-- GAME_V: コードを更新して配布するときは、下の importmap と最下部 main.js の「?v=」を1つ上げる。
     こうしないとブラウザ(特にiPhone Safari)が古いjsモジュールをキャッシュし続け、
     新旧混在で壊れることがある(?v=はHTMLからの参照にしか効かないため、全モジュールをここで束ねる)。 -->
<script type="importmap">{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "./js/data.js":"./js/data.js?v=5",
  "./js/nav.js":"./js/nav.js?v=5",
  "./js/sfx.js":"./js/sfx.js?v=5",
  "./js/fx.js":"./js/fx.js?v=5",
  "./js/economy.js":"./js/economy.js?v=5",
  "./js/save.js":"./js/save.js?v=5",
  "./js/proximity.js":"./js/proximity.js?v=5",
  "./js/render.js":"./js/render.js?v=5",
  "./js/entities.js":"./js/entities.js?v=5",
  "./js/world.js":"./js/world.js?v=5",
  "./js/build.js":"./js/build.js?v=5",
  "./js/shop.js":"./js/shop.js?v=5",
  "./js/npc.js":"./js/npc.js?v=5",
  "./js/ui.js":"./js/ui.js?v=5"
}}</script>
</head>
<body>
<div id="title"><span>❄️ 雪原サバイバル2</span></div>
<div id="hud"></div>
<div id="upgrades"></div>
<div id="toast"></div>
<div id="debug"></div>
<div id="fatal"></div>
<script>
// CDN不達の検出: 8秒待ってもmainが起動フラグを立てなければ案内を出す
window.__cdnTimer = setTimeout(() => {
  if (!window.__booted) {
    const f = document.getElementById('fatal');
    f.style.display = 'flex';
    f.textContent = '読み込みに失敗しました。通信環境の良い場所でページを再読み込みしてください。';
  }
}, 8000);
</script>
<script type="module" src="./js/main.js?v=5"></script>
</body>
</html>
